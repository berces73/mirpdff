<!doctype html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5.0">
<meta name="robots" content="noindex,nofollow">
<title>Sayfa Bulunamadı — MirPDF</title>
<link rel="icon" href="/assets/brand/favicon/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>document.documentElement.setAttribute('data-theme','light');</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;color:#111827;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.nav{height:60px;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid #e5e7eb;display:flex;align-items:center;flex-shrink:0}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 24px;width:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:.4rem;font-weight:700;font-size:.9375rem;color:#111827}
.nav-logo img{border-radius:6px}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px}
.card{text-align:center;max-width:480px;width:100%}
.err-code{font-size:6rem;font-weight:800;color:#f3f4f6;letter-spacing:-.05em;line-height:1;margin-bottom:-.5rem}
.err-title{font-size:1.5rem;font-weight:700;color:#111827;margin-bottom:.75rem;letter-spacing:-.02em}
.err-sub{font-size:.9375rem;color:#6b7280;line-height:1.65;margin-bottom:2rem}
.btn-row{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-bottom:2.5rem}
.btn-primary{display:inline-flex;align-items:center;gap:.4rem;height:42px;padding:0 20px;background:#111827;color:#fff;font-size:.875rem;font-weight:700;border-radius:9px;transition:.15s}
.btn-primary:hover{opacity:.85}
.btn-outline{display:inline-flex;align-items:center;gap:.4rem;height:42px;padding:0 20px;border:1.5px solid #e5e7eb;color:#374151;font-size:.875rem;font-weight:600;border-radius:9px;background:#fff;transition:.15s}
.btn-outline:hover{border-color:#9ca3af;background:#f9fafb}
.tools-hint{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:1.5rem;text-align:left}
.tools-hint-label{font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:.75rem}
.tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.tool-link{display:flex;align-items:center;gap:.5rem;padding:.5rem .65rem;border-radius:7px;font-size:.8125rem;font-weight:500;color:#374151;transition:.12s}
.tool-link:hover{background:#f3f4f6;color:#111827}
.tool-link-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
.footer{border-top:1px solid #e5e7eb;padding:16px 24px;text-align:center;font-size:.6875rem;color:#9ca3af;flex-shrink:0}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img src="/assets/icons/logo.svg" width="26" height="26" alt="">MirPDF
    </a>
    <a href="/register" style="display:inline-flex;align-items:center;height:34px;padding:0 14px;background:#111827;color:#fff;font-size:.8125rem;font-weight:600;border-radius:8px">Ücretsiz Kayıt</a>
  </div>
</nav>
<main class="page">
  <div class="card">
    <div class="err-code">404</div>
    <h1 class="err-title">Sayfa bulunamadı</h1>
    <p class="err-sub">Aradığınız sayfa taşınmış veya kaldırılmış olabilir.<br>Aşağıdan devam edebilirsiniz.</p>
    <div class="btn-row">
      <a href="/" class="btn-primary">← Ana Sayfaya Dön</a>
      <a href="/#tools" class="btn-outline">Tüm Araçlar</a>
    </div>
    <div class="tools-hint">
      <div class="tools-hint-label">Popüler Araçlar</div>
      <div class="tools-grid">
        <a href="/pdf-birlestir" class="tool-link"><div class="tool-link-icon" style="background:#eff6ff;color:#2563eb">🔗</div>PDF Birleştir</a>
        <a href="/pdf-sikistir" class="tool-link"><div class="tool-link-icon" style="background:#f0fdf4;color:#16a34a">📦</div>PDF Sıkıştır</a>
        <a href="/pdf-bol" class="tool-link"><div class="tool-link-icon" style="background:#fff7ed;color:#ea580c">✂️</div>PDF Böl</a>
        <a href="/pdf-to-word" class="tool-link"><div class="tool-link-icon" style="background:#faf5ff;color:#9333ea">📝</div>PDF → Word</a>
        <a href="/ocr" class="tool-link"><div class="tool-link-icon" style="background:#fefce8;color:#ca8a04">🔍</div>OCR / Metin</a>
        <a href="/jpg-to-pdf" class="tool-link"><div class="tool-link-icon" style="background:#fff1f2;color:#e11d48">🖼️</div>JPG → PDF</a>
      </div>
    </div>
  </div>
</main>
<footer class="footer">© 2026 MirPDF · <a href="/legal/privacy.html" style="color:#9ca3af">Gizlilik</a> · <a href="/contact" style="color:#9ca3af">İletişim</a></footer>
</body>
</html>
