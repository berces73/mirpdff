<style>
:root{--bg:#ffffff;--bg-soft:#f7f8fc;--border:#e3e6f0;--text:#0d0f1a;--muted:#64748b;--primary:#6366f1;--success:#10b981;--danger:#ef4444}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Figtree',sans-serif;background:var(--bg-soft);color:var(--text);line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{width:100%;max-width:400px;background:#fff;border:1px solid var(--border);border-radius:24px;padding:2.5rem 2rem;box-shadow:0 4px 24px rgba(0,0,0,.06);text-align:center}
.icon{font-size:2.8rem;margin-bottom:1.2rem;display:block}
.card h1{font-size:1.35rem;font-weight:800;margin-bottom:.5rem}
.card p{color:var(--muted);font-size:.9rem;margin-bottom:1.5rem;line-height:1.6}
.btn{display:inline-block;padding:.72rem 1.5rem;background:var(--text);color:#fff;border:none;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);margin-left:.5rem}
.btn-ghost:hover{background:var(--bg-soft);opacity:1}
.spinner{display:inline-block;width:2.5rem;height:2.5rem;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:1.2rem}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<style id="__global_mobile">
/* ── Global Mobile Nav Fix ── */
#mobileToggle,#nav-toggle{
  display:none;background:none;
  border:1.5px solid #e3e6f0;color:#0d0f1a;
  padding:.4rem .65rem;border-radius:9px;
  cursor:pointer;font-size:1rem;
  position:relative;z-index:400;
  align-items:center;justify-content:center;
}
@media(max-width:700px){
  #mobileToggle,#nav-toggle{display:flex!important}
  
  /* nav-links (tool sayfaları) */
  .nav-links{
    display:none!important;flex-direction:column!important;
    position:absolute!important;top:64px!important;left:0!important;right:0!important;
    background:#fff!important;border-bottom:1px solid #e3e6f0!important;
    box-shadow:0 12px 32px rgba(0,0,0,.12)!important;
    padding:1rem 1.25rem 1.5rem!important;gap:.15rem!important;z-index:300!important;
  }
  .nav-links.open,.nav-links.show{display:flex!important}
  .nav-links a{
    padding:.7rem 1rem!important;border-radius:10px!important;
    font-size:.95rem!important;color:#374151!important;
    text-decoration:none!important;font-weight:500!important;
    border:none!important;background:none!important;
  }
  .nav-links a:hover{background:#f7f8fc!important;color:#0d0f1a!important}
  .nav-links .nav-btn,.nav-links .mir-btn-primary{
    margin-top:.5rem!important;padding:.8rem 1rem!important;
    text-align:center!important;border-radius:11px!important;
  }

  /* mainNav (diğer sayfalar) */  
  #mainNav:not(.desktop-only){
    display:none!important;flex-direction:column!important;
    position:absolute!important;top:64px!important;left:0!important;right:0!important;
    background:#fff!important;border-bottom:1px solid #e3e6f0!important;
    box-shadow:0 12px 32px rgba(0,0,0,.12)!important;
    padding:1rem 1.25rem 1.5rem!important;gap:.15rem!important;z-index:300!important;
  }
  #mainNav.show{display:flex!important}
  #mainNav a{
    padding:.7rem 1rem!important;border-radius:10px!important;
    font-size:.95rem!important;color:#374151!important;
    text-decoration:none!important;font-weight:500!important;
    white-space:normal!important;
    border:none!important;background:none!important;
  }
  #mainNav a:hover{background:#f7f8fc!important;color:#0d0f1a!important}
  
  /* Footer linkler */
  footer a{text-decoration:none!important}
}

/* ── Global Footer Link Color Fix ── */
footer.sf a,footer.sf div,
.sf a,.sfi a,
.fcol a,.fbot a,
footer[style*="background:#0d"] a,
footer[style*="background: #0d"] a{
  color:rgba(255,255,255,.65)!important;
  text-decoration:none!important;
}
footer.sf a:hover,.fcol a:hover,.fbot a:hover{color:#fff!important}

/* Light footer */
footer:not(.sf) a{
  text-decoration:none;
  color:inherit;
}

<body>

<div class="card" id="card">
  <div class="spinner" id="spinner" aria-label="Yükleniyor"></div>
  <h1 id="title">E-posta doğrulanıyor…</h1>
  <p id="body">Lütfen bekle.</p>
</div>

<script type="module">
import { saveToken, invalidateMeCache } from "/assets/js/auth.js";

// Token hem ?token= hem #token= formatında gelebilir
const params = new URLSearchParams(location.search.length > 1 ? location.search : location.hash.replace(/^#/, "?"));
const token  = params.get("token") || "";

const spinner = document.getElementById("spinner");
const title   = document.getElementById("title");
const body    = document.getElementById("body");

function render(icon, t, b, actions = "") {
  spinner.style.display = "none";
  title.textContent = t;
  body.innerHTML = b + (actions ? `<div style="margin-top:1.25rem">${actions}</div>` : "");
  // icon emoji olarak göster
  const iconEl = document.createElement("span");
  iconEl.className = "icon";
  iconEl.textContent = icon;
  spinner.parentNode.insertBefore(iconEl, spinner);
}

if (!token) {
  render("⚠️", "Token bulunamadı", "Doğrulama bağlantısı geçersiz veya eksik.",
    `<a href="/" class="btn">Ana Sayfaya Dön</a>`);
} else {
  (async () => {
    try {
      const resp = await fetch("/api/auth/verify", {
        method: "POST",
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token }),
      });
      const j = await resp.json().catch(() => null);

      if (resp.ok && j?.ok) {
        // Yeni token döndüyse kaydet — otomatik giriş
        if (j.data?.token) { saveToken(j.data.token); invalidateMeCache(); }
        // Hoş geldin ekranı
        spinner.style.display = "none";
        document.getElementById("card").innerHTML = `
          <span style="font-size:3rem;display:block;margin-bottom:1rem">🎉</span>
          <h1 style="font-size:1.35rem;font-weight:800;margin-bottom:.5rem;color:#0d0f1a">E-posta doğrulandı!</h1>
          <p style="color:#64748b;font-size:.9rem;margin-bottom:1.25rem;line-height:1.6">Hesabın hazır. Hemen kullanmaya başlayabilirsin.</p>
          <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem;text-align:left">
            <div style="font-size:.82rem;font-weight:700;color:#1d4ed8;margin-bottom:.6rem">⚡ Hesabına yüklendi:</div>
            <div style="display:flex;flex-direction:column;gap:.4rem">
              <div style="display:flex;align-items:center;gap:.5rem;font-size:.83rem;color:#374151">
                <span style="width:20px;height:20px;background:#dbeafe;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#1d4ed8;flex-shrink:0">5</span>
                <span><strong>5 ücretsiz kredi</strong> — OCR, Sıkıştır, PDF→Word için</span>
              </div>
              <div style="display:flex;align-items:center;gap:.5rem;font-size:.83rem;color:#374151">
                <span style="width:20px;height:20px;background:#dbeafe;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#1d4ed8;flex-shrink:0">∞</span>
                <span><strong>Sınırsız</strong> — Birleştir, Böl, Döndür ve daha fazlası</span>
              </div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:.6rem">
            <a href="/" style="display:block;padding:.78rem;background:#0d0f1a;color:#fff;border-radius:12px;font-weight:700;font-size:.95rem;text-decoration:none;text-align:center">
              PDF Araçlarını Keşfet →
            </a>
            <a href="/account" style="display:block;padding:.7rem;background:transparent;color:#64748b;border:1.5px solid #e3e6f0;border-radius:12px;font-weight:600;font-size:.88rem;text-decoration:none;text-align:center">
              Hesabıma Git
            </a>
          </div>
          <p style="color:#94a3b8;font-size:.78rem;margin-top:1rem">3 saniye içinde yönlendiriliyorsun…</p>
        `;
        // Otomatik yönlendirme — giriş yapıldıysa hesaba, yapılmadıysa login'e
        setTimeout(() => {
          location.href = j.data?.token ? "/" : "/login?verified=1";
        }, 3000);
      } else if (resp.status === 400 && j?.error === "EXPIRED_TOKEN") {
        render("⏰", "Bağlantı süresi dolmuş", "Bu doğrulama bağlantısı 24 saatte bir yenilenir.",
          `<a href="/account" class="btn">Yeni Bağlantı İste</a><a href="/" class="btn btn-ghost">Ana Sayfa</a>`);
      } else if (resp.status === 400 && j?.error === "INVALID_TOKEN") {
        render("🔗", "Geçersiz bağlantı", "Bağlantı hatalı veya daha önce kullanıldı. E-postanızı kontrol edin.",
          `<a href="/account" class="btn">Yeni Bağlantı İste</a><a href="/" class="btn btn-ghost">Ana Sayfa</a>`);
      } else {
        render("❌", "Doğrulama başarısız", j?.message || "Bir sorun oluştu.",
          `<a href="/" class="btn">Ana Sayfaya Dön</a>`);
      }
    } catch (_) {
      render("❌", "Bağlantı hatası", "Sunucuya ulaşılamadı. Sayfayı yenile.",
        `<button class="btn" onclick="location.reload()">Tekrar Dene</button>`);
    }
  })();
}
</script>

<script type="module">
import { initLangSwitcher } from "/assets/js/lang-switcher.js";
initLangSwitcher();
</script>
<script src="/assets/js/cookie-consent.js" defer></script>
<script>
(function(){
  var mt=document.getElementById('mobileToggle')||document.getElementById('nav-toggle');
  var nav=document.getElementById('mainNav')||document.querySelector('.nav-links');
  if(!mt||!nav)return;
  if(mt.dataset.nb)return;
  mt.dataset.nb='1';
  mt.addEventListener('click',function(e){
    e.stopPropagation();
    var open=nav.classList.toggle('show');
    if(nav.classList.contains('nav-links'))nav.classList.toggle('open',open);
    mt.setAttribute('aria-expanded',String(open));
    mt.innerHTML=open?'<i class="fas fa-times"></i>':'<i class="fas fa-bars"></i>';
    var ov=document.getElementById('__nv');
    if(open){
      if(!ov){
        ov=document.createElement('div');
        ov.id='__nv';
        ov.style.cssText='position:fixed;inset:0;z-index:249;background:rgba(0,0,0,.4)';
        document.body.appendChild(ov);
        ov.addEventListener('click',closeNav);
      }
    } else { ov&&ov.remove(); }
  });
  nav.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click',closeNav);
  });
  function closeNav(){
    nav.classList.remove('show','open');
    mt.setAttribute('aria-expanded','false');
    mt.innerHTML='<i class="fas fa-bars"></i>';
    var ov=document.getElementById('__nv');
    if(ov)ov.remove();
  }
})();
</script>
</body>
