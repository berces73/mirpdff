<!doctype html>
<html lang="tr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
  <title id="pageTitle">Site Arama — MirPDF</title>
  <meta name="description" content="MirPDF sitesinde arama yapın. PDF araçları, rehberler ve blog yazıları arasında arayın.">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://mirpdf.com/arama">
  <link rel="icon" href="/assets/brand/favicon/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
<style>
.search-hero{background:#f8fafc;border-bottom:1px solid #e3e6f0;padding:3rem 0 2rem}
.search-hero h1{font-size:1.75rem;font-weight:800;margin-bottom:1rem;text-align:center}
.search-wrap{position:relative;max-width:640px;margin:0 auto}
.search-input{width:100%;padding:.85rem 1rem .85rem 3rem;border:2px solid #e3e6f0;border-radius:14px;font-family:inherit;font-size:1rem;background:#fff;outline:none;transition:border-color .2s;color:#0d0f1a}
.search-input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:1rem;pointer-events:none}
.search-clear{position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#94a3b8;cursor:pointer;font-size:.9rem;display:none}
.filter-tabs{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-top:1rem}
.filter-tab{background:none;border:1.5px solid #e3e6f0;border-radius:50px;padding:.35rem .9rem;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;color:#64748b;transition:.15s}
.filter-tab:hover{border-color:#6366f1;color:#6366f1}
.filter-tab.active{background:#6366f1;border-color:#6366f1;color:#fff}
.results-section{max-width:800px;margin:2.5rem auto;padding:0 1rem}
.results-meta{font-size:.85rem;color:#94a3b8;margin-bottom:1.25rem}
.result-card{display:flex;gap:1rem;align-items:flex-start;padding:1.25rem;background:#fff;border:1px solid #e3e6f0;border-radius:14px;margin-bottom:.75rem;text-decoration:none;color:inherit;transition:border-color .15s,box-shadow .15s}
.result-card:hover{border-color:#6366f1;box-shadow:0 4px 16px rgba(99,102,241,.1)}
.result-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.result-icon.tool{background:linear-gradient(135deg,#eef2ff,#e0e7ff);color:#6366f1}
.result-icon.article{background:linear-gradient(135deg,#f0fdf4,#dcfce7);color:#16a34a}
.result-icon.page{background:linear-gradient(135deg,#fff7ed,#ffedd5);color:#ea580c}
.result-body{flex:1;min-width:0}
.result-title{font-weight:700;color:#0d0f1a;font-size:.95rem;margin-bottom:.3rem}
.result-title mark{background:#fef9c3;border-radius:3px;padding:0 2px}
.result-desc{font-size:.83rem;color:#64748b;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.result-badge{display:inline-block;font-size:.7rem;font-weight:700;padding:.15rem .55rem;border-radius:6px;margin-top:.4rem;text-transform:uppercase;letter-spacing:.05em}
.badge-tool{background:#eef2ff;color:#6366f1}
.badge-article{background:#f0fdf4;color:#16a34a}
.badge-page{background:#fff7ed;color:#ea580c}
.empty-state{text-align:center;padding:4rem 1rem;color:#94a3b8}
.empty-state i{font-size:3rem;margin-bottom:1rem;display:block}
.popular-section{margin-top:2rem}
.popular-section h3{font-size:.88rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem}
.popular-list{display:flex;flex-wrap:wrap;gap:.5rem}
.popular-tag{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;padding:.35rem .8rem;font-size:.84rem;color:#475569;text-decoration:none;cursor:pointer;transition:.15s}
.popular-tag:hover{background:#eef2ff;border-color:#c7d2fe;color:#6366f1}
</style>
<script>document.documentElement.setAttribute('data-theme','light');</script>
</head>
<body>

<header class="header">
  <div class="container">
    <div class="header-content">
      <a href="/" class="logo"><i class="fas fa-file-pdf"></i> MirPDF</a>
      <nav class="nav">
        <a href="/tools/" class="nav-link">Araçlar</a>
        <a href="/articles/" class="nav-link">Blog</a>
        <a href="/pricing.html" class="nav-link">Fiyatlar</a>
      </nav>
    </div>
  </div>
</header>

<div class="search-hero">
  <div class="container">
    <h1>Site Araması</h1>
    <div class="search-wrap">
      <i class="fas fa-search search-icon"></i>
      <input type="search" id="searchInput" class="search-input"
             placeholder="Araç, rehber veya konu ara… (örn: PDF sıkıştır)"
             autocomplete="off" spellcheck="false">
      <button class="search-clear" id="clearBtn" onclick="clearSearch()" title="Temizle">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-cat="all"     onclick="setFilter('all')">Tümü</button>
      <button class="filter-tab"        data-cat="tool"    onclick="setFilter('tool')">Araçlar</button>
      <button class="filter-tab"        data-cat="article" onclick="setFilter('article')">Makaleler</button>
      <button class="filter-tab"        data-cat="page"    onclick="setFilter('page')">Sayfalar</button>
    </div>
  </div>
</div>

<div class="results-section">
  <div id="resultsMeta" class="results-meta" style="display:none"></div>
  <div id="resultsContainer"></div>

  <div id="emptyState" class="empty-state" style="display:none">
    <i class="fas fa-search-minus"></i>
    <strong id="emptyTitle">Sonuç bulunamadı</strong>
    <p id="emptyDesc" style="margin-top:.5rem;font-size:.88rem"></p>
  </div>

  <div id="initialState">
    <div class="popular-section">
      <h3>Popüler Aramalar</h3>
      <div class="popular-list" id="popularList"></div>
    </div>
  </div>
</div>

<script>
/* ====================================================
   Arama indeksi — tüm araçlar + önemli makaleler
   ==================================================== */
const INDEX = [
  /* ── ARAÇLAR ── */
  { cat:'tool', title:'PDF Sıkıştır', desc:'PDF dosya boyutunu küçült, kaliteyi koru. Sıkıştırma seviyesini seç.', url:'/tools/pdf-sikistir.html', icon:'fas fa-compress-alt', keywords:'boyut küçüt compress sikistir indir' },
  { cat:'tool', title:'PDF Birleştir', desc:'Birden fazla PDF dosyasını tek bir belgede birleştir.', url:'/tools/pdf-birlestir.html', icon:'fas fa-object-group', keywords:'merge birlestir yapıştır ekle' },
  { cat:'tool', title:'PDF Böl', desc:'PDF sayfalarını istediğin şekilde böl, ayır, çıkar.', url:'/tools/pdf-bol.html', icon:'fas fa-cut', keywords:'ayır split bol parcala' },
  { cat:'tool', title:'PDF\'den JPG\'ye', desc:'PDF sayfalarını yüksek kaliteli JPG resimlerine dönüştür.', url:'/tools/pdf-den-jpg.html', icon:'fas fa-image', keywords:'resim görüntü jpg png convert' },
  { cat:'tool', title:'JPG\'den PDF\'ye', desc:'Fotoğraf ve resimleri tek tıkla PDF\'e çevir.', url:'/tools/jpg-den-pdf.html', icon:'fas fa-file-image', keywords:'fotoğraf resim görüntü pdf yap' },
  { cat:'tool', title:'PDF\'den Word\'e', desc:'PDF belgeni düzenlenebilir Word (DOCX) formatına çevir.', url:'/tools/pdf-to-word.html', icon:'fas fa-file-word', keywords:'word docx düzenle çevir convert' },
  { cat:'tool', title:'Word\'den PDF\'ye', desc:'Word belgeni hızlı ve kayıpsız PDF\'e çevir.', url:'/tools/word-to-pdf.html', icon:'fas fa-file-word', keywords:'word docx pdf çevir convert' },
  { cat:'tool', title:'Excel\'den PDF\'ye', desc:'Excel tablosunu PDF formatında kaydet.', url:'/tools/excel-to-pdf.html', icon:'fas fa-file-excel', keywords:'excel xlsx tablo pdf' },
  { cat:'tool', title:'PPT\'den PDF\'ye', desc:'PowerPoint sunumunu PDF\'e dönüştür.', url:'/tools/ppt-to-pdf.html', icon:'fas fa-file-powerpoint', keywords:'powerpoint sunum slayt pdf' },
  { cat:'tool', title:'PDF Kilitle', desc:'PDF dosyana şifre ekle, izinsiz erişimi engelle.', url:'/tools/pdf-kilitle.html', icon:'fas fa-lock', keywords:'şifre koruma kilitle güvenlik password' },
  { cat:'tool', title:'PDF Kilit Aç', desc:'Şifreli PDF\'in kilidini aç, düzenlemeye izin ver.', url:'/tools/pdf-kilit-ac.html', icon:'fas fa-unlock', keywords:'şifre kaldır kilit aç unlock' },
  { cat:'tool', title:'PDF Döndür', desc:'PDF sayfalarını 90° veya 180° döndür.', url:'/tools/pdf-dondur.html', icon:'fas fa-sync', keywords:'döndür çevir rotasyon rotate' },
  { cat:'tool', title:'Sayfa Sil', desc:'PDF\'den istemediğin sayfaları sil veya çıkar.', url:'/tools/sayfa-sil.html', icon:'fas fa-trash', keywords:'sayfa sil kaldır çıkar remove' },
  { cat:'tool', title:'Sayfa Sırala', desc:'PDF sayfalarının sırasını değiştir, yeniden düzenle.', url:'/tools/sayfa-sirala.html', icon:'fas fa-sort', keywords:'sırala düzenle taşı reorder' },
  { cat:'tool', title:'PDF İmzala', desc:'PDF\'e dijital imza ekle, belgeni imzalayarak gönder.', url:'/tools/pdf-imzala.html', icon:'fas fa-signature', keywords:'imza dijital e-imza sign' },
  { cat:'tool', title:'PDF Düzenle', desc:'PDF üzerine metin, şekil ve not ekle.', url:'/tools/pdf-duzenle.html', icon:'fas fa-edit', keywords:'düzenle metin yaz not edit' },
  { cat:'tool', title:'Filigran Ekle', desc:'PDF\'e metin veya logo filigranı ekle.', url:'/tools/filigran-ekle.html', icon:'fas fa-tint', keywords:'filigran watermark logo damga' },
  { cat:'tool', title:'QR Kod Ekle', desc:'PDF\'e QR kod ekle, taranabilir bağlantı oluştur.', url:'/tools/qr-kod-ekle.html', icon:'fas fa-qrcode', keywords:'qr kod barkod link' },
  { cat:'tool', title:'OCR — Metin Tanıma', desc:'Taranmış PDF\'deki yazıları tanı, aranabilir metin yap.', url:'/tools/ocr.html', icon:'fas fa-font', keywords:'ocr metin tanı tarat tarama scan' },

  /* ── ÖNEMLİ MAKALELER ── */
  { cat:'article', title:'PDF Sıkıştırma Nasıl Yapılır?', desc:'Farklı yöntemlerle PDF boyutunu küçültmenin tam rehberi.', url:'/articles/pdf-sikistirma-nasil.html', icon:'fas fa-book-open', keywords:'boyut küçüt sıkıştır' },
  { cat:'article', title:'PDF\'den Word\'e Dönüşümde Bozulma Neden Olur?', desc:'Dönüşüm sorunlarının nedenleri ve çözümleri.', url:'/articles/pdf-word-bozuluyor.html', icon:'fas fa-book-open', keywords:'word bozulma sorun' },
  { cat:'article', title:'Şifreli PDF Nasıl Açılır?', desc:'Şifreyi bildiğinde veya unuttuğunda PDF kilidi açma yolları.', url:'/articles/sifreli-pdf-acma.html', icon:'fas fa-book-open', keywords:'şifreli açma kilit' },
  { cat:'article', title:'OCR ile Türkçe PDF Metin Tanıma', desc:'Taranmış belgeleri aranabilir yapma, Türkçe karakter desteği.', url:'/articles/ocr-turkce-pdf-metin.html', icon:'fas fa-book-open', keywords:'ocr metin tanıma türkçe' },
  { cat:'article', title:'iPhone\'da PDF Düzenleme', desc:'iOS\'ta PDF araçları ve en iyi uygulamalar.', url:'/articles/iphone-pdf-duzenleme.html', icon:'fas fa-book-open', keywords:'iphone ios mobil' },
  { cat:'article', title:'Smallpdf vs iLovePDF Karşılaştırması', desc:'İki popüler PDF aracını MirPDF ile karşılaştırıyoruz.', url:'/articles/smallpdf-ilovepdf-karsilastirma.html', icon:'fas fa-book-open', keywords:'karşılaştır alternatif' },
  { cat:'article', title:'E-Devlet PDF Dönüştürme', desc:'E-Devlet belgelerini Word veya küçük PDF\'e çevirme rehberi.', url:'/articles/e-devlet-pdf-donusturme.html', icon:'fas fa-book-open', keywords:'e-devlet devlet resmi belge' },
  { cat:'article', title:'İmza için PDF Düzenleme', desc:'PDF belgesine doğru imza eklemenin yolları.', url:'/articles/imza-icin-pdf-duzenleme.html', icon:'fas fa-book-open', keywords:'imza sign belge' },

  /* ── SAYFALAR ── */
  { cat:'page', title:'Fiyatlandırma', desc:'Ücretsiz, Pro ve Kurumsal planları karşılaştır.', url:'/pricing.html', icon:'fas fa-tag', keywords:'fiyat plan ücret premium pro' },
  { cat:'page', title:'Hakkımızda', desc:'MirPDF\'in hikayesi, ekibi ve misyonu.', url:'/about.html', icon:'fas fa-info-circle', keywords:'hakkında ekip kim' },
  { cat:'page', title:'İletişim', desc:'Destek, kurumsal görüşme veya geri bildirim için bize ulaşın.', url:'/contact.html', icon:'fas fa-envelope', keywords:'iletişim destek yardım' },
  { cat:'page', title:'SSS — Sık Sorulan Sorular', desc:'En çok sorulan soruların cevapları.', url:'/faq.html', icon:'fas fa-question-circle', keywords:'soru cevap nasıl neden' },
  { cat:'page', title:'Geliştirici API', desc:'MirPDF API\'sini entegre edin. OpenAPI dokümantasyonu.', url:'/developers/', icon:'fas fa-code', keywords:'api developer entegrasyon' },
  { cat:'page', title:'Arkadaşını Davet Et', desc:'Davet programı ile kredi kazan.', url:'/referral.html', icon:'fas fa-gift', keywords:'davet referral kredi kazan' },
  { cat:'page', title:'Durum Sayfası', desc:'MirPDF servislerinin anlık durumunu takip edin.', url:'/status.html', icon:'fas fa-heartbeat', keywords:'durum çalışıyor sorun status' },
  { cat:'page', title:'Kurumsal', desc:'Şirketiniz için özel çözümler ve kurumsal plan.', url:'/kurumsal/', icon:'fas fa-building', keywords:'kurumsal şirket toplu' },
];

const POPULAR = ['PDF sıkıştır','PDF birleştir','Word\'e çevir','Şifre kaldır','OCR','e-devlet','imza','JPG'];

let currentFilter = 'all';
let currentQuery  = '';
let debounceTimer;

function normalize(str) {
  return str.toLowerCase()
    .replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
    .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c')
    .replace(/[^a-z0-9\s]/g,' ');
}

function score(item, query) {
  const q   = normalize(query);
  const t   = normalize(item.title);
  const d   = normalize(item.desc);
  const k   = normalize(item.keywords || '');
  const words = q.split(/\s+/).filter(Boolean);
  if (!words.length) return 0;
  let s = 0;
  for (const w of words) {
    if (t.startsWith(w))      s += 10;
    else if (t.includes(w))   s += 7;
    if (k.includes(w))        s += 5;
    if (d.includes(w))        s += 3;
  }
  return s;
}

function highlight(text, query) {
  const words = query.trim().split(/\s+/).filter(w => w.length > 1);
  if (!words.length) return text;
  const re = new RegExp('(' + words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === cat);
  });
  doSearch(currentQuery);
}

function doSearch(query) {
  currentQuery = query;
  const inp = document.getElementById('searchInput');
  if (inp.value !== query) inp.value = query;
  document.getElementById('clearBtn').style.display = query ? 'block' : 'none';

  const initial = document.getElementById('initialState');
  const meta    = document.getElementById('resultsMeta');
  const cont    = document.getElementById('resultsContainer');
  const empty   = document.getElementById('emptyState');

  if (!query.trim()) {
    initial.style.display = 'block';
    meta.style.display    = 'none';
    cont.innerHTML        = '';
    empty.style.display   = 'none';
    document.title        = 'Site Arama — MirPDF';
    history.replaceState(null,'','/arama');
    return;
  }

  initial.style.display = 'none';
  history.replaceState(null,'',`/arama?q=${encodeURIComponent(query)}`);
  document.title = `"${query}" araması — MirPDF`;

  let results = INDEX
    .map(item => ({ ...item, _score: score(item, query) }))
    .filter(item => item._score > 0)
    .sort((a,b) => b._score - a._score);

  if (currentFilter !== 'all') results = results.filter(r => r.cat === currentFilter);

  meta.style.display = 'block';
  meta.textContent   = results.length
    ? `"${query}" için ${results.length} sonuç bulundu`
    : '';

  if (!results.length) {
    cont.innerHTML      = '';
    empty.style.display = 'block';
    document.getElementById('emptyTitle').textContent = `"${query}" için sonuç bulunamadı`;
    document.getElementById('emptyDesc').textContent  = 'Farklı kelimeler deneyin veya araç listesine göz atın.';
    return;
  }

  empty.style.display = 'none';
  const BADGE = { tool:'Araç', article:'Makale', page:'Sayfa' };
  cont.innerHTML = results.map(r => `
    <a href="${r.url}" class="result-card">
      <div class="result-icon ${r.cat}"><i class="${r.icon}"></i></div>
      <div class="result-body">
        <div class="result-title">${highlight(r.title, query)}</div>
        <div class="result-desc">${highlight(r.desc, query)}</div>
        <span class="result-badge badge-${r.cat}">${BADGE[r.cat]}</span>
      </div>
      <i class="fas fa-chevron-right" style="color:#cbd5e1;align-self:center;font-size:.8rem;flex-shrink:0"></i>
    </a>`).join('');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch('');
}

/* Popüler etiketler */
document.getElementById('popularList').innerHTML = POPULAR.map(p =>
  `<span class="popular-tag" onclick="doSearch('${p}')">${p}</span>`).join('');

/* Giriş dinleyici */
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => doSearch(e.target.value), 150);
});

/* URL'den sorgu oku */
const urlQ = new URLSearchParams(location.search).get('q');
if (urlQ) doSearch(urlQ);
</script>
<script src="/assets/js/cookie-consent.js" defer></script>
</body>
</html>
