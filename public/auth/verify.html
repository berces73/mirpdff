<body>
  <h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Yönlendiriliyor</h1>
<script>
  // /auth/verify?token=X  →  /account/verify?token=X
  const p = new URLSearchParams(location.search);
  const t = p.get("token") || "";
  location.replace("/account/verify" + (t ? "?token=" + encodeURIComponent(t) : ""));
</script>

<script type="module">
import { initLangSwitcher } from "/assets/js/lang-switcher.js";

</script>
