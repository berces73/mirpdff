<style>
:root{--bg:#f7f8fc;--border:#e3e6f0;--text:#0d0f1a;--muted:#64748b}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:#fff;border-bottom:1px solid var(--border);padding:0 1.5rem;height:64px;display:flex;align-items:center}
.logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;color:var(--text);font-weight:800;font-size:1.1rem}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.card{width:100%;max-width:480px;background:#fff;border:1px solid var(--border);border-radius:24px;padding:2.75rem 2rem;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.icon-wrap{width:64px;height:64px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:1.5rem;color:var(--muted)}
h1{font-size:1.45rem;font-weight:800;margin-bottom:.5rem}
.sub{color:var(--muted);font-size:.9rem;line-height:1.6;margin-bottom:.75rem}
.info-box{background:#f7f8fc;border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.75rem;text-align:left}
.info-box p{font-size:.85rem;color:var(--muted);line-height:1.6}
.info-box strong{color:var(--text)}
.btns{display:flex;flex-direction:column;gap:.6rem}
.btn{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.85rem 1.5rem;border-radius:12px;font-size:.92rem;font-weight:700;text-decoration:none;transition:opacity .15s;border:none;font-family:inherit;cursor:pointer}
.btn:hover{opacity:.88}
.btn-primary{background:#0d0f1a;color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
footer{border-top:1px solid var(--border);padding:1.25rem;text-align:center;color:var(--muted);font-size:.8rem}
footer a{color:var(--muted);text-decoration:none;margin:0 .4rem}
</style>
  <meta property="og:url" content="https://mirpdf.com/billing/cancel"/>
  <meta property="og:description" content="MirPDF ödeme işlemi tamamlanmadı. İstediğiniz zaman tekrar deneyebilir veya ücretsiz planı kullanmaya devam edebilirsiniz."/>
<style id="__global_mobile">
/* ── Global Mobile Nav Fix ── */
#mobileToggle,#nav-toggle{
  display:none;background:none;
  border:1.5px solid #e3e6f0;color:#0d0f1a;
  padding:.4rem .65rem;border-radius:9px;
  cursor:pointer;font-size:1rem;
  position:relative;z-index:400;
  align-items:center;justify-content:center;
}
@media(max-width:700px){
  #mobileToggle,#nav-toggle{display:flex!important}
  
  /* nav-links (tool sayfaları) */
  .nav-links{
    display:none!important;flex-direction:column!important;
    position:absolute!important;top:64px!important;left:0!important;right:0!important;
    background:#fff!important;border-bottom:1px solid #e3e6f0!important;
    box-shadow:0 12px 32px rgba(0,0,0,.12)!important;
    padding:1rem 1.25rem 1.5rem!important;gap:.15rem!important;z-index:300!important;
  }
  .nav-links.open,.nav-links.show{display:flex!important}
  .nav-links a{
    padding:.7rem 1rem!important;border-radius:10px!important;
    font-size:.95rem!important;color:#374151!important;
    text-decoration:none!important;font-weight:500!important;
    border:none!important;background:none!important;
  }
  .nav-links a:hover{background:#f7f8fc!important;color:#0d0f1a!important}
  .nav-links .nav-btn,.nav-links .mir-btn-primary{
    margin-top:.5rem!important;padding:.8rem 1rem!important;
    text-align:center!important;border-radius:11px!important;
  }

  /* mainNav (diğer sayfalar) */  
  #mainNav:not(.desktop-only){
    display:none!important;flex-direction:column!important;
    position:absolute!important;top:64px!important;left:0!important;right:0!important;
    background:#fff!important;border-bottom:1px solid #e3e6f0!important;
    box-shadow:0 12px 32px rgba(0,0,0,.12)!important;
    padding:1rem 1.25rem 1.5rem!important;gap:.15rem!important;z-index:300!important;
  }
  #mainNav.show{display:flex!important}
  #mainNav a{
    padding:.7rem 1rem!important;border-radius:10px!important;
    font-size:.95rem!important;color:#374151!important;
    text-decoration:none!important;font-weight:500!important;
    white-space:normal!important;
    border:none!important;background:none!important;
  }
  #mainNav a:hover{background:#f7f8fc!important;color:#0d0f1a!important}
  
  /* Footer linkler */
  footer a{text-decoration:none!important}
}

/* ── Global Footer Link Color Fix ── */
footer.sf a,footer.sf div,
.sf a,.sfi a,
.fcol a,.fbot a,
footer[style*="background:#0d"] a,
footer[style*="background: #0d"] a{
  color:rgba(255,255,255,.65)!important;
  text-decoration:none!important;
}
footer.sf a:hover,.fcol a:hover,.fbot a:hover{color:#fff!important}

/* Light footer */
footer:not(.sf) a{
  text-decoration:none;
  color:inherit;
}
</style>
</head>
<body>
<header>
  <a href="/" class="logo">
    <img src="/assets/icons/logo.svg" width="32" height="32" alt="" class="mir-logo-img">
    MirPDF
  </a>
</header>

<main>
  <div class="card">
    <div class="icon-wrap"><i class="fas fa-times"></i></div>
    <h1>Ödeme tamamlanmadı</h1>
    <p class="sub">Hesabınızda herhangi bir değişiklik yapılmadı.<br>Ücret tahsil edilmedi.</p>

    <div class="info-box">
      <p><strong>Sorun yaşıyor musanız</strong> farklı bir ödeme yöntemi deneyebilirsiniz. Sorun devam ederse <a href="/contact" style="color:#6366f1;font-weight:600">destek ekibimize</a> yazın.</p>
    </div>

    <div class="btns">
      <a href="/pricing" class="btn btn-primary"><i class="fas fa-redo"></i> Tekrar Dene</a>
      <a href="/#tools" class="btn btn-outline"><i class="fas fa-tools"></i> Ücretsiz Devam Et</a>
    </div>
  </div>
</main>

<footer>
  <a href="/legal/privacy.html">Gizlilik</a>
  <a href="/legal/terms.html">Kullanım Şartları</a>
  <a href="/contact">İletişim</a>
  <span style="margin-left:.5rem">© 2026 MirPDF</span>
</footer>
<script defer src="/assets/js/cookie-consent.js"></script>
<script>
(function(){
  var mt=document.getElementById('mobileToggle')||document.getElementById('nav-toggle');
  var nav=document.getElementById('mainNav')||document.querySelector('.nav-links');
  if(!mt||!nav)return;
  if(mt.dataset.nb)return;
  mt.dataset.nb='1';
  mt.addEventListener('click',function(e){
    e.stopPropagation();
    var open=nav.classList.toggle('show');
    if(nav.classList.contains('nav-links'))nav.classList.toggle('open',open);
    mt.setAttribute('aria-expanded',String(open));
    mt.innerHTML=open?'<i class="fas fa-times"></i>':'<i class="fas fa-bars"></i>';
    var ov=document.getElementById('__nv');
    if(open){
      if(!ov){
        ov=document.createElement('div');
        ov.id='__nv';
        ov.style.cssText='position:fixed;inset:0;z-index:249;background:rgba(0,0,0,.4)';
        document.body.appendChild(ov);
        ov.addEventListener('click',closeNav);
      }
    } else { ov&&ov.remove(); }
  });
  nav.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click',closeNav);
  });
  function closeNav(){
    nav.classList.remove('show','open');
    mt.setAttribute('aria-expanded','false');
    mt.innerHTML='<i class="fas fa-bars"></i>';
    var ov=document.getElementById('__nv');
    if(ov)ov.remove();
  }
})();
</script>
</body>
</html>
