<!doctype html>
<html lang="tr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bülten Aboneliği — MirPDF</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/assets/brand/favicon/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Figtree',sans-serif;background:#f7f8fc;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.card{background:#fff;border-radius:22px;padding:3rem 2.5rem;max-width:440px;width:100%;text-align:center;box-shadow:0 4px 32px rgba(0,0,0,.09)}
.icon{font-size:3rem;margin-bottom:1rem}
h1{font-size:1.4rem;font-weight:800;color:#0d0f1a;margin-bottom:.65rem}
p{color:#64748b;line-height:1.65;font-size:.92rem;margin-bottom:1.5rem}
.btn{display:inline-block;background:#6366f1;color:#fff;text-decoration:none;padding:.7rem 2rem;border-radius:12px;font-weight:700;font-size:.92rem;border:none;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-outline{background:#f1f5f9;color:#374151;margin-right:.5rem}
.loading{color:#94a3b8;font-size:.9rem}
.error{color:#ef4444}
.success{color:#10b981}
</style>
<script>document.documentElement.setAttribute('data-theme','light');</script>
<style id="__global_mobile">
/* ── Global Mobile Nav Fix ── */
#mobileToggle,#nav-toggle{
  display:none;background:none;
  border:1.5px solid #e3e6f0;color:#0d0f1a;
  padding:.4rem .65rem;border-radius:9px;
  cursor:pointer;font-size:1rem;
  position:relative;z-index:400;
  align-items:center;justify-content:center;
}
@media(max-width:700px){
  #mobileToggle,#nav-toggle{display:flex!important}
  
  /* nav-links (tool sayfaları) */
  .nav-links{
    display:none!important;flex-direction:column!important;
    position:absolute!important;top:64px!important;left:0!important;right:0!important;
    background:#fff!important;border-bottom:1px solid #e3e6f0!important;
    box-shadow:0 12px 32px rgba(0,0,0,.12)!important;
    padding:1rem 1.25rem 1.5rem!important;gap:.15rem!important;z-index:300!important;
  }
  .nav-links.open,.nav-links.show{display:flex!important}
  .nav-links a{
    padding:.7rem 1rem!important;border-radius:10px!important;
    font-size:.95rem!important;color:#374151!important;
    text-decoration:none!important;font-weight:500!important;
    border:none!important;background:none!important;
  }
  .nav-links a:hover{background:#f7f8fc!important;color:#0d0f1a!important}
  .nav-links .nav-btn,.nav-links .mir-btn-primary{
    margin-top:.5rem!important;padding:.8rem 1rem!important;
    text-align:center!important;border-radius:11px!important;
  }

  /* mainNav (diğer sayfalar) */  
  #mainNav:not(.desktop-only){
    display:none!important;flex-direction:column!important;
    position:absolute!important;top:64px!important;left:0!important;right:0!important;
    background:#fff!important;border-bottom:1px solid #e3e6f0!important;
    box-shadow:0 12px 32px rgba(0,0,0,.12)!important;
    padding:1rem 1.25rem 1.5rem!important;gap:.15rem!important;z-index:300!important;
  }
  #mainNav.show{display:flex!important}
  #mainNav a{
    padding:.7rem 1rem!important;border-radius:10px!important;
    font-size:.95rem!important;color:#374151!important;
    text-decoration:none!important;font-weight:500!important;
    white-space:normal!important;
    border:none!important;background:none!important;
  }
  #mainNav a:hover{background:#f7f8fc!important;color:#0d0f1a!important}
  
  /* Footer linkler */
  footer a{text-decoration:none!important}
}

/* ── Global Footer Link Color Fix ── */
footer.sf a,footer.sf div,
.sf a,.sfi a,
.fcol a,.fbot a,
footer[style*="background:#0d"] a,
footer[style*="background: #0d"] a{
  color:rgba(255,255,255,.65)!important;
  text-decoration:none!important;
}
footer.sf a:hover,.fcol a:hover,.fbot a:hover{color:#fff!important}

/* Light footer */
footer:not(.sf) a{
  text-decoration:none;
  color:inherit;
}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">İşleniyor…</h1>
  <p id="desc" class="loading">Lütfen bekleyin.</p>
</div>

<script>
const params = new URLSearchParams(location.search);
const email  = params.get('email') || '';
const token  = params.get('token') || '';

async function run() {
  if (!email || !token) {
    show('❌','Geçersiz bağlantı','Bu bağlantı geçersiz veya eksik. Lütfen e-postanızdaki bağlantıyı kullanın.','error');
    return;
  }

  try {
    const res = await fetch(`/api/newsletter/unsubscribe?email=${encodeURIComponent(email)}&token=${encodeURIComponent(token)}`, { method:'POST' });
    const j   = await res.json().catch(()=>({}));
    if (res.ok && j.ok) {
      show('✅','Abonelik iptal edildi',`<strong>${email}</strong> adresi bülten listemizden kaldırıldı. Üzgünüz, yeniden görmek dileğiyle!`,'success');
    } else if (res.status === 403) {
      show('❌','Geçersiz token','Bu bağlantı artık geçerli değil. Lütfen yeni bir abonelik iptal talebi oluşturun.','error');
    } else {
      show('⚠️','Bir sorun oluştu','İsteğiniz işlenemedi. Lütfen destek@mirpdf.com adresine yazın.','error');
    }
  } catch {
    show('⚠️','Bağlantı hatası','Sunucuya ulaşılamadı. Lütfen sayfayı yenileyin.','error');
  }
}

function show(icon, title, desc, type) {
  document.getElementById('icon').textContent  = icon;
  document.getElementById('title').textContent = title;
  const d = document.getElementById('desc');
  d.innerHTML   = desc + `<br><br><a href="/" class="btn btn-outline">Anasayfa</a>`;
  d.className   = type;
}

run();
</script>
<script src="/assets/js/cookie-consent.js" defer></script>
<script>
(function(){
  var mt=document.getElementById('mobileToggle')||document.getElementById('nav-toggle');
  var nav=document.getElementById('mainNav')||document.querySelector('.nav-links');
  if(!mt||!nav)return;
  if(mt.dataset.nb)return;
  mt.dataset.nb='1';
  mt.addEventListener('click',function(e){
    e.stopPropagation();
    var open=nav.classList.toggle('show');
    if(nav.classList.contains('nav-links'))nav.classList.toggle('open',open);
    mt.setAttribute('aria-expanded',String(open));
    mt.innerHTML=open?'<i class="fas fa-times"></i>':'<i class="fas fa-bars"></i>';
    var ov=document.getElementById('__nv');
    if(open){
      if(!ov){
        ov=document.createElement('div');
        ov.id='__nv';
        ov.style.cssText='position:fixed;inset:0;z-index:249;background:rgba(0,0,0,.4)';
        document.body.appendChild(ov);
        ov.addEventListener('click',closeNav);
      }
    } else { ov&&ov.remove(); }
  });
  nav.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click',closeNav);
  });
  function closeNav(){
    nav.classList.remove('show','open');
    mt.setAttribute('aria-expanded','false');
    mt.innerHTML='<i class="fas fa-bars"></i>';
    var ov=document.getElementById('__nv');
    if(ov)ov.remove();
  }
})();
</script>
</body>
</html>
