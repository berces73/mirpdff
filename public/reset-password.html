<style>
:root{--bg:#ffffff;--bg-soft:#f7f8fc;--border:#e3e6f0;--text:#0d0f1a;--muted:#64748b;--primary:#6366f1;--danger:#ef4444}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Figtree',sans-serif;background:var(--bg-soft);color:var(--text);line-height:1.6;overflow-x:hidden}
.container{max-width:1100px;margin:0 auto;padding:0 1.5rem}
.header{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.93);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:66px}
.logo{display:flex;align-items:center;gap:.55rem;text-decoration:none;color:var(--text);font-weight:800;font-size:1.18rem}
.logo-mark{width:34px;height:34px;border-radius:10px;background:var(--text);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.9rem}
.auth-wrap{min-height:calc(100vh - 66px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.auth-card{width:100%;max-width:420px;background:#fff;border:1px solid var(--border);border-radius:24px;padding:2.25rem 2rem;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.auth-card h1{font-size:1.4rem;font-weight:800;margin-bottom:.3rem}
.auth-card .sub{color:var(--muted);font-size:.9rem;margin-bottom:1.75rem}
.field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.1rem}
.field label{font-size:.84rem;font-weight:600}
.pass-wrap{position:relative}
.pass-wrap input{width:100%;padding:.72rem 2.8rem .72rem 1rem;border:1.5px solid var(--border);border-radius:12px;font-size:.95rem;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
.pass-wrap input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.pass-toggle{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:.95rem;padding:0}
.btn-auth{width:100%;padding:.82rem;background:var(--text);color:#fff;border:none;border-radius:12px;font-size:.97rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;margin-top:.25rem}
.btn-auth:hover:not(:disabled){opacity:.88}
.btn-auth:disabled{opacity:.55;cursor:not-allowed}
.msg-err{display:none;background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;border-radius:10px;padding:.7rem 1rem;font-size:.875rem;margin-bottom:1rem}
.msg-ok{display:none;background:#f0fdf4;border:1px solid #86efac;color:#15803d;border-radius:10px;padding:.7rem 1rem;font-size:.875rem;margin-bottom:1rem}
.auth-footer{text-align:center;margin-top:1.4rem;font-size:.875rem;color:var(--muted)}
.auth-footer a{color:var(--text);font-weight:600;text-decoration:none}
.token-err{text-align:center;padding:2rem;color:var(--muted)}
footer{border-top:1px solid var(--border);padding:1.5rem 0;text-align:center;color:var(--muted);font-size:.82rem}
footer a{color:var(--muted)}
</style>

<style id="__global_mobile">
/* ── Global Mobile Nav Fix ── */
#mobileToggle,#nav-toggle{
  display:none;background:none;
  border:1.5px solid #e3e6f0;color:#0d0f1a;
  padding:.4rem .65rem;border-radius:9px;
  cursor:pointer;font-size:1rem;
  position:relative;z-index:400;
  align-items:center;justify-content:center;
}
@media(max-width:700px){
  #mobileToggle,#nav-toggle{display:flex!important}
  
  /* nav-links (tool sayfaları) */
  .nav-links{
    display:none!important;flex-direction:column!important;
    position:absolute!important;top:64px!important;left:0!important;right:0!important;
    background:#fff!important;border-bottom:1px solid #e3e6f0!important;
    box-shadow:0 12px 32px rgba(0,0,0,.12)!important;
    padding:1rem 1.25rem 1.5rem!important;gap:.15rem!important;z-index:300!important;
  }
  .nav-links.open,.nav-links.show{display:flex!important}
  .nav-links a{
    padding:.7rem 1rem!important;border-radius:10px!important;
    font-size:.95rem!important;color:#374151!important;
    text-decoration:none!important;font-weight:500!important;
    border:none!important;background:none!important;
  }
  .nav-links a:hover{background:#f7f8fc!important;color:#0d0f1a!important}
  .nav-links .nav-btn,.nav-links .mir-btn-primary{
    margin-top:.5rem!important;padding:.8rem 1rem!important;
    text-align:center!important;border-radius:11px!important;
  }

  /* mainNav (diğer sayfalar) */  
  #mainNav:not(.desktop-only){
    display:none!important;flex-direction:column!important;
    position:absolute!important;top:64px!important;left:0!important;right:0!important;
    background:#fff!important;border-bottom:1px solid #e3e6f0!important;
    box-shadow:0 12px 32px rgba(0,0,0,.12)!important;
    padding:1rem 1.25rem 1.5rem!important;gap:.15rem!important;z-index:300!important;
  }
  #mainNav.show{display:flex!important}
  #mainNav a{
    padding:.7rem 1rem!important;border-radius:10px!important;
    font-size:.95rem!important;color:#374151!important;
    text-decoration:none!important;font-weight:500!important;
    white-space:normal!important;
    border:none!important;background:none!important;
  }
  #mainNav a:hover{background:#f7f8fc!important;color:#0d0f1a!important}
  
  /* Footer linkler */
  footer a{text-decoration:none!important}
}

/* ── Global Footer Link Color Fix ── */
footer.sf a,footer.sf div,
.sf a,.sfi a,
.fcol a,.fbot a,
footer[style*="background:#0d"] a,
footer[style*="background: #0d"] a{
  color:rgba(255,255,255,.65)!important;
  text-decoration:none!important;
}
footer.sf a:hover,.fcol a:hover,.fbot a:hover{color:#fff!important}

/* Light footer */
footer:not(.sf) a{
  text-decoration:none;
  color:inherit;
}
</style>

<body>
<header class="header">
  <div class="container">
    <div class="header-inner">
      <a href="/" class="logo"><img loading="eager" src="/assets/icons/logo.svg" width="32" height="32" alt="" class="mir-logo-img">MirPDF</a>
    </div>
  </div>
</header>

<main class="auth-wrap">
  <div class="auth-card" id="formCard">
    <h1>Yeni şifre belirle</h1>
    <p class="sub">En az 8 karakter.</p>

    <div class="msg-err" id="msgErr" role="alert" aria-live="polite"></div>
    <div class="msg-ok"  id="msgOk"  role="status" aria-live="polite"></div>

    <div class="field">
      <label for="password">Yeni Şifre</label>
      <div class="pass-wrap">
        <input id="password" type="password" autocomplete="new-password" placeholder="En az 10 karakter" required>
        <button class="pass-toggle" type="button" aria-label="Şifreyi göster/gizle" id="passToggle">
          <i class="fas fa-eye" id="passIcon"></i>
        </button>
      </div>
      <div class="pw-strength" style="height:4px;border-radius:4px;margin-top:.4rem;background:#e3e6f0;overflow:hidden"><div id="pwBar" style="height:100%;border-radius:4px;width:0;transition:width .3s,background .3s"></div></div>
      <span id="pwHint" style="font-size:.75rem;color:#64748b;margin-top:.25rem;display:block">En az 10 karakter, büyük harf ve rakam içermeli</span>
    </div>

    <div class="field">
      <label for="password2">Yeni Şifre Tekrar</label>
      <div class="pass-wrap">
        <input id="password2" type="password" autocomplete="new-password" placeholder="Şifrenizi tekrar girin" required>
        <button class="pass-toggle" type="button" aria-label="Şifreyi göster/gizle" id="passToggle2">
          <i class="fas fa-eye" id="passIcon2"></i>
        </button>
      </div>
      <span id="pw2Hint" style="font-size:.75rem;color:#94a3b8;margin-top:.25rem;display:block"></span>
    </div>

    <button class="btn-auth" id="submitBtn">
      <i class="fas fa-lock" aria-hidden="true"></i> Şifremi Güncelle
    </button>

    <div class="auth-footer">
      <a href="/login"><i class="fas fa-arrow-left" style="font-size:.8rem"></i> Girişe dön</a>
    </div>
  </div>
</main>

<footer><div class="container">© 2026 MirPDF &nbsp;·&nbsp; <a href="/legal/privacy.html">Gizlilik</a> &nbsp;·&nbsp; <a href="/legal/terms.html">Kullanım Şartları</a> &nbsp;·&nbsp; <a href="/contact">İletişim</a></div></footer>

<script type="module">
// Token URL parametresinden gelir: /reset-password?token=xxx
const params = new URLSearchParams(location.search);
const token  = params.get("token") || "";

const passEl   = document.getElementById("password");
const submitBtn = document.getElementById("submitBtn");
const msgErr   = document.getElementById("msgErr");
const msgOk    = document.getElementById("msgOk");

if (!token) {
  document.getElementById("formCard").innerHTML =
    `<div class="token-err">
      <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:#f59e0b;display:block;margin-bottom:1rem"></i>
      <p style="font-weight:700;margin-bottom:.5rem">Geçersiz bağlantı</p>
      <p style="font-size:.9rem;margin-bottom:1.5rem">Sıfırlama bağlantısı eksik veya süresi dolmuş.</p>
      <a href="/forgot-password" style="color:var(--primary);font-weight:600;text-decoration:none">Yeni bağlantı al →</a>
    </div>`;
}

function showErr(m) { msgErr.textContent = m; msgErr.style.display = "block"; msgOk.style.display = "none"; }
function showOk(m)  { msgOk.textContent  = m; msgOk.style.display  = "block"; msgErr.style.display = "none"; }

document.getElementById("passToggle")?.addEventListener("click", () => {
  const show = passEl.type === "password";
  passEl.type = show ? "text" : "password";
  document.getElementById("passIcon").className = show ? "fas fa-eye-slash" : "fas fa-eye";
});

async function doReset() {
  msgErr.style.display = msgOk.style.display = "none";
  const password = passEl.value;
  const password2 = document.getElementById("password2")?.value || "";
  if (password.length < 10) { showErr("Şifre en az 10 karakter olmalı."); return; }
  if (!/[A-Z]/.test(password)) { showErr("Şifre en az bir büyük harf içermeli."); return; }
  if (!/[0-9]/.test(password)) { showErr("Şifre en az bir rakam içermeli."); return; }
  if (password !== password2) { showErr("Şifreler eşleşmiyor."); document.getElementById("password2").focus(); return; }

  submitBtn.disabled = true;
  submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Güncelleniyor…';

  try {
    const resp = await fetch("/api/auth/reset", {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, password }),
    });
    const j = await resp.json().catch(() => null);

    if (resp.ok && j?.ok) {
      showOk("Şifren güncellendi. Şimdi giriş yapabilirsin.");
      submitBtn.style.display = "none";
      setTimeout(() => { location.href = "/login?reset=success"; }, 2000);
      return;
    }

    if (resp.status === 400 && (j?.error === "EXPIRED_TOKEN" || j?.error === "TOKEN_EXPIRED")) {
      showErr("Bağlantının süresi dolmuş. <a href='/forgot-password' style='color:#6366f1;font-weight:600'>Yeni bağlantı al →</a>");
    } else if (resp.status === 400 && j?.error === "TOKEN_USED") {
      showErr("Bu bağlantı daha önce kullanıldı. Yeni bir talepte bulun. <a href='/forgot-password' style='color:#6366f1;font-weight:600'>Yeni bağlantı al →</a>");
    } else if (resp.status === 400 && j?.error === "INVALID_TOKEN") {
      showErr("Geçersiz bağlantı. Lütfen e-postanızdaki bağlantıyı kullanın. <a href='/forgot-password' style='color:#6366f1;font-weight:600'>Yeni bağlantı al →</a>");
    } else if (resp.status === 400 && j?.error === "SAME_PASSWORD") {
      showErr("Yeni şifre eski şifreyle aynı olamaz.");
    } else {
      showErr(j?.message || "Şifre güncellenemedi. Lütfen tekrar deneyin.");
    }
  } catch (_) {
    showErr("Bağlantı hatası. Tekrar dene.");
  } finally {
    if (submitBtn.style.display !== "none") {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-lock"></i> Şifremi Güncelle';
    }
  }
}


// Şifre gücü
const pwBar = document.getElementById("pwBar");
const pwHint = document.getElementById("pwHint");
const pw2Hint = document.getElementById("pw2Hint");
const passEl2 = document.getElementById("password2");

document.getElementById("password")?.addEventListener("input", () => {
  const v = document.getElementById("password").value;
  let s=0;
  if(v.length>=10)s++;if(v.length>=14)s++;
  if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
  const pct=Math.min(100,s*20);
  const col=s<=1?"#ef4444":s<=3?"#f59e0b":"#10b981";
  if(pwBar){pwBar.style.width=pct+"%";pwBar.style.background=col;}
  const labels=["","Çok zayıf","Zayıf","Orta","İyi","Güçlü"];
  if(pwHint)pwHint.textContent=v.length===0?"En az 10 karakter, büyük harf ve rakam içermeli":(labels[s]||"Güçlü");
  if(passEl2?.value) checkMatch();
});

function checkMatch() {
  const v1 = document.getElementById("password").value;
  const v2 = passEl2?.value || "";
  if (!v2) { pw2Hint.textContent=""; return true; }
  const match = v1 === v2;
  pw2Hint.textContent = match ? "✓ Şifreler eşleşiyor" : "✗ Şifreler eşleşmiyor";
  pw2Hint.style.color = match ? "#15803d" : "#dc2626";
  return match;
}
passEl2?.addEventListener("input", checkMatch);

document.getElementById("passToggle2")?.addEventListener("click", () => {
  const show = passEl2.type === "password";
  passEl2.type = show ? "text" : "password";
  document.getElementById("passIcon2").className = show ? "fas fa-eye-slash" : "fas fa-eye";
});

submitBtn?.addEventListener("click", doReset);
passEl?.addEventListener("keydown", e => { if (e.key === "Enter") doReset(); });
passEl2?.addEventListener("keydown", e => { if (e.key === "Enter") doReset(); });
</script>

<script type="module">
import { initLangSwitcher } from "/assets/js/lang-switcher.js";
initLangSwitcher();

<script>
(function(){
  var mt=document.getElementById('mobileToggle')||document.getElementById('nav-toggle');
  var nav=document.getElementById('mainNav')||document.querySelector('.nav-links');
  if(!mt||!nav)return;
  if(mt.dataset.nb)return;
  mt.dataset.nb='1';
  mt.addEventListener('click',function(e){
    e.stopPropagation();
    var open=nav.classList.toggle('show');
    if(nav.classList.contains('nav-links'))nav.classList.toggle('open',open);
    mt.setAttribute('aria-expanded',String(open));
    mt.innerHTML=open?'<i class="fas fa-times"></i>':'<i class="fas fa-bars"></i>';
    var ov=document.getElementById('__nv');
    if(open){
      if(!ov){
        ov=document.createElement('div');
        ov.id='__nv';
        ov.style.cssText='position:fixed;inset:0;z-index:249;background:rgba(0,0,0,.4)';
        document.body.appendChild(ov);
        ov.addEventListener('click',closeNav);
      }
    } else { ov&&ov.remove(); }
  });
  nav.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click',closeNav);
  });
  function closeNav(){
    nav.classList.remove('show','open');
    mt.setAttribute('aria-expanded','false');
    mt.innerHTML='<i class="fas fa-bars"></i>';
    var ov=document.getElementById('__nv');
    if(ov)ov.remove();
  }
})();
</script>
