<!doctype html>
<html lang="tr">
<head>
{{> head}}
<title>{{title}} | MirPDF</title>
<meta name="description" content="{{desc}}" />
<link rel="canonical" href="{{baseUrl}}/seo/rehberler/{{slug}}.html" />
<meta property="og:title" content="{{title}}" />
<meta property="og:description" content="{{desc}}" />
<meta property="og:type" content="article" />
</head>
<body>
<div class="bg"></div>
<main class="wrap">
{{> header}}

<article class="card blog-article">
  <header class="article-header">
    <h1>{{title}}</h1>
    <p class="lead">{{desc}}</p>
  </header>

  <div class="article-body">
    <p>{{body}}</p>
  </div>

  <div class="cta-box">
    <h3>PDF işlemlerinizi hızlandırın</h3>
    <a href="/" class="primary">Tüm PDF Araçlarını Keşfet →</a>
  </div>
</article>

{{> footer}}
</main>
</body>
</html>
